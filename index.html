<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>INGENIoT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="ingeniot_reducido.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08111F;
      color: #EAF2FB;
      text-align: center;
    }

    /* 🔵 BANNER */
    .banner {
      height: 150px;
      background-image: url("banner_modulos.jpeg");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 17, 31, 0.6);
    }

    .banner-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .banner img {
      width: 180px;
    }

    /* 🔵 CONTENIDO */
    .content {
      padding: 40px 20px;
      max-width: 700px;
      margin: auto;
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(242,140,40,0.1);
      color: #FFB15A;
      font-size: 14px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      color: #9FB3C8;
      line-height: 1.6;
    }

    .btn {
      margin-top: 25px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: linear-gradient(135deg, #F28C28, #FFB15A);
      color: #08111F;
    }
    
    .icon {
      width: 18px;
      vertical-align: middle;
      margin-right: 8px;
    }

  </style>

</head>

<body>

  <!-- 🔥 BANNER -->

  <div class="banner">
    <div class="banner-content">
    </div>
  </div>

  <!-- 🔥 CONTENIDO -->

  <div class="content">


    
  <!-- LOGO INGENIoT -->
<img src="ingeniot.png" alt="INGENIoT">

    

<h1>Algo está llegando.</h1>

<p>
  Muy pronto vas a encontrar en esta web la presentación oficial de INGENIoT,
  con información sobre nuestros productos y una forma directa de contactarnos.
</p>

<p>
  Estamos preparando una experiencia simple, técnica y pensada para proyectos reales.
</p>

<a class="btn" href="https://instagram.com/ingeniot.store" target="_blank">
  <img src="ig_logo.png" class="icon">
  Seguinos!
</a>

  </div>

</body>
</html>
